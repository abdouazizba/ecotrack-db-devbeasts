          description: Liste des utilisateurs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'

    post:
      tags:
        - User
      summary: Créer un utilisateur (admin)
      description: Crée un utilisateur via l'auth-service (register). Transmis automatiquement au user-service par événement RabbitMQ.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 6
                nom:
                  type: string
                prenom:
                  type: string
                role:
                  type: string
                  enum: [agent, citoyen, admin]
      responses:
        '201':
          description: Utilisateur créé
        '400':
          description: Données invalides ou email déjà utilisé
        '503':
          description: Auth service indisponible

  /users/me:
    get:
      tags:
        - User
      summary: Profil complet de l'utilisateur connecté (user-service)
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Profil utilisateur avec données de rôle

  /users/{id}:
    get:
      tags:
        - User
      summary: Détails d'un utilisateur
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Détails utilisateur

    put:
      tags:
        - User
      summary: Mettre à jour un utilisateur
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                nom:
                  type: string
                prenom:
                  type: string
                date_naissance:
                  type: string
                  format: date
                is_active:
                  type: boolean
      responses:
        '200':
          description: Utilisateur mis à jour

    delete:
      tags:
        - User
      summary: Supprimer un utilisateur
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Utilisateur supprimé

  /users/{id}/role:
    put:
      tags:
        - User
      summary: Assigner un rôle à un utilisateur
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - role
              properties:
                role:
                  type: string
                  enum: [super_admin, admin, agent, citoyen]
                roleData:
                  type: object
                  description: "Données spécifiques au rôle (ex: numero_badge pour agent)"
      responses:
        '200':
          description: Rôle mis à jour

  /users/{id}/profile:
    get:
      tags:
        - User
      summary: Profil complet avec données du rôle (Agent / Citoyen / Admin)
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Profil utilisateur avec données spécifiques au rôle

  # ========== AGENT ENDPOINTS (user-service) ==========
  /agents/{id}/zone:
    get:
      tags:
        - Agent
      summary: "[LEGACY] Zone assignée à un agent"
      description: "Retourne les détails de la zone assignée à l'agent si elle existe. Les agents ne sont plus systématiquement assignés à une zone — les tournées sont désormais multi-zones. Retourne 404 si l'agent n'a pas de zone."
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: UUID de l'agent
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Zone de l'agent
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  zone:
                    type: object
                    properties:
                      id:
                        type: string
                        format: uuid
                      nom:
                        type: string
                      code_zone:
                        type: string
        '404':
          description: Agent introuvable ou aucune zone assignée
        '401':
          description: Non authentifié
        '403':
          description: Accès refusé (seulement l'agent lui-même ou un admin)

  /agents/{id}/zone/containers:
    get:
      tags:
        - Agent
      summary: "[LEGACY] Conteneurs de la zone d'un agent"
      description: "Retourne les conteneurs de la zone assignée à l'agent. Endpoint legacy — les tournées ne sont plus zone-restreintes. Retourne 404 si l'agent n'a pas de zone assignée."
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: UUID de l'agent
          schema:
            type: string
            format: uuid
        - name: statut
          in: query
          schema:
            type: string
            enum: [actif, maintenance, retire]
        - name: type_conteneur
          in: query
          schema:
            type: string
            enum: [standard, selective, organic, hazardous]
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: page
          in: query
          schema:
            type: integer
            default: 1
      responses:
        '200':
          description: Conteneurs de la zone de l'agent
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  conteneurs:
                    type: array
                    items:
                      $ref: '#/components/schemas/Conteneur'
                  total:
                    type: integer
        '404':
          description: Agent introuvable ou aucune zone assignée
        '401':
          description: Non authentifié
        '403':
          description: Accès refusé

  # ========== IOT ENDPOINTS ==========
  /iot/measure:
    post:
      tags:
        - IoT
      summary: Envoyer une mesure de capteur IoT
      description: Reçoit les données d'un capteur et les transmet au container-service. Déclenche une alerte RabbitMQ si taux_remplissage > 80%.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - id_conteneur
                - capteur_id
                - taux_remplissage
              properties:
                id_conteneur:
                  type: string
                  format: uuid
                  description: UUID du conteneur concerné
                capteur_id:
                  type: string
                  description: Identifiant du capteur (ex. SENSOR-abc12345)
                taux_remplissage:
                  type: number
                  minimum: 0
                  maximum: 100
                  description: Pourcentage de remplissage (0-100)
                temperature:
                  type: number
                  description: Température en Celsius
                batterie:
                  type: integer
                  minimum: 0
                  maximum: 100
                  description: Niveau de batterie en pourcentage
                signal_force:
                  type: integer
                  description: Force du signal radio (dBm, ex. -75)
                notes:
                  type: string
      responses:
        '201':
          description: Mesure enregistrée avec succès
        '400':
          description: Données invalides

  /iot/device/register:
    post:
      tags:
        - IoT
      summary: Enregistrer un nouveau capteur IoT
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - capteur_id
              properties:
                capteur_id:
                  type: string
                type:
                  type: string
      responses:
        '201':
          description: Capteur enregistré

  /iot/device/{capteur_id}:
    get:
      tags:
        - IoT
      summary: Informations d'un capteur
      parameters:
        - name: capteur_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Informations du capteur

  /iot/status:
    get:
      tags:
        - IoT
      summary: Statut du service IoT et du simulateur
      responses:
        '200':
          description: Statut du service

  # ========== CAPTEURS (IoT sensors — managed by container-service) ==========

  /capteurs:
    post:
      tags:
        - Capteur
      summary: Créer un capteur IoT
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - code_capteur
                - type
                - id_conteneur
              properties:
                code_capteur:
                  type: string
                  example: CAPT-PC-001-REMPLISSAGE
                type:
                  type: string
                  enum: [REMPLISSAGE, TEMPERATURE, SIGNAL]
                id_conteneur:
                  type: string
                  format: uuid
                statut:
                  type: string
                  enum: [ACTIF, INACTIF, EN_MAINTENANCE]
                  default: ACTIF
                batterie:
                  type: integer
                  minimum: 0
                  maximum: 100
      responses:
        '201':
          description: Capteur créé
        '404':
          description: Conteneur introuvable
        '409':
          description: code_capteur déjà utilisé

    get:
      tags:
        - Capteur
      summary: Liste tous les capteurs
      security:
        - BearerAuth: []
      parameters:
        - name: id_conteneur
          in: query
          description: Filtrer par conteneur
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Liste des capteurs

  /capteurs/conteneur/{conteneurId}:
    get:
      tags:
        - Capteur
      summary: Capteurs d'un conteneur
      security:
        - BearerAuth: []
      parameters:
        - name: conteneurId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Capteurs du conteneur

  /capteurs/{id}:
    get:
      tags:
        - Capteur
      summary: Détails d'un capteur
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Détails du capteur
        '404':
          description: Capteur introuvable

    put:
      tags:
        - Capteur
      summary: Mettre à jour un capteur
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                code_capteur:
                  type: string
                type:
                  type: string
                  enum: [REMPLISSAGE, TEMPERATURE, SIGNAL]
                statut:
                  type: string
                  enum: [ACTIF, INACTIF, EN_MAINTENANCE]
                batterie:
                  type: integer
                  minimum: 0
                  maximum: 100
      responses:
        '200':
          description: Capteur mis à jour
        '404':
          description: Capteur introuvable

    delete:
      tags:
        - Capteur
      summary: Supprimer un capteur
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Capteur supprimé
        '404':
          description: Capteur introuvable

  /capteurs/{id}/conteneur:
    patch:
      tags:
        - Capteur
      summary: Affecter un capteur à un conteneur
      description: Réassigne le capteur à un conteneur différent.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - id_conteneur
              properties:
                id_conteneur:
                  type: string
                  format: uuid
      responses:
        '200':
          description: Capteur réassigné au conteneur
        '404':
          description: Capteur ou conteneur introuvable

  /capteurs/{id}/batterie:
    patch:
      tags:
        - Capteur
      summary: Mettre à jour le niveau de batterie
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - batterie
              properties:
                batterie:
                  type: integer
                  minimum: 0
                  maximum: 100
      responses:
        '200':
          description: Batterie mise à jour

  # ========== DASHBOARD ==========
  /dashboard/stats:
    get:
      tags:
        - Dashboard
      summary: Statistiques agrégées pour le tableau de bord
      description: Agrège les statistiques de container-service, tour-service et signal-service en un seul appel.
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Statistiques agrégées
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      containers:
                        type: integer
                      zones:
                        type: integer
                      tours:
                        type: integer
                      toursInProgress:
                        type: integer
                      averageFillRate:
                        type: number
                      criticalContainers:
                        type: integer
                      openSignals:
                        type: integer
                      totalSignals:
                        type: integer

  # ========== MONITORING & METRICS ==========
  /metrics:
    get:
      tags:
        - Monitoring
      summary: Métriques Prometheus
      description: |
        Chaque service expose `/metrics` au format Prometheus (text/plain).
        Métriques incluses : HTTP duration histogram, request counter, active requests gauge,
        Node.js defaults (CPU, RAM, event loop lag, GC), et métriques métier
        (`ecotrack_signalements_created_total`, `ecotrack_tournees_active`).
        Scrapé par Prometheus toutes les 15 secondes.
      responses:
        '200':
          description: Métriques au format Prometheus text exposition
          content:
            text/plain:
              schema:
                type: string

  # ========== INTERNAL ENDPOINTS (container-service, no auth) ==========
  /internal/containers:
    get:
      tags:
        - Internal
      summary: Liste des conteneurs pour communication inter-services
      description: |
        Endpoint interne (pas d'authentification) accessible uniquement dans le réseau Docker.
        Utilisé par signal-service seed pour récupérer les vrais container IDs + zone IDs.
        Retourne max 200 conteneurs.
      responses:
        '200':
          description: Liste des conteneurs avec zone
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                      format: uuid
                    id_zone:
                      type: string
                      format: uuid
                    code_conteneur:
                      type: string
                    latitude:
                      type: number
                    longitude:
                      type: number

  /internal/containers/{id}:
    get:
      tags:
        - Internal
      summary: Détails d'un conteneur (inter-services)
      description: |
        Endpoint interne (pas d'authentification). Utilisé par SignalementService.createSignalement()
        pour auto-détecter la zone d'un conteneur à la création d'un signalement.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Conteneur trouvé
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                  id_zone:
                    type: string
                    format: uuid
                  code_conteneur:
                    type: string
        '404':
          description: Conteneur introuvable

  # ========== PHOTO UPLOADS ==========
  /uploads/signals/{filename}:
    get:
      tags:
        - Uploads
      summary: Récupérer une photo de signalement
      description: |
        Sert les photos uploadées lors de la clôture d'un signalement.
        Proxifié par le gateway vers signal-service.
        Formats acceptés : JPEG, PNG, WebP. Max 5 MB.
      parameters:
        - name: filename
          in: path
          required: true
          schema:
            type: string
          example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890.jpeg"
      responses:
        '200':
          description: Image binaire
          content:
            image/jpeg:
              schema:
                type: string
                format: binary
        '404':
          description: Photo introuvable
