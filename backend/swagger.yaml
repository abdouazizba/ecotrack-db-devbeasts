        - name: role
          in: query
          description: Filtrer par rôle (ex. agent, citoyen, admin)
          schema:
            type: string
            enum: [super_admin, admin, agent, citoyen]
        - name: limit
          in: query
          schema:
            type: integer
        - name: offset
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: Liste des utilisateurs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'

    post:
      tags:
        - User
      summary: Créer un utilisateur (admin)
      description: Crée un utilisateur via l'auth-service (register). Transmis automatiquement au user-service par événement RabbitMQ.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 6
                nom:
                  type: string
                prenom:
                  type: string
                role:
                  type: string
                  enum: [agent, citoyen, admin]
      responses:
        '201':
          description: Utilisateur créé
        '400':
          description: Données invalides ou email déjà utilisé
        '503':
          description: Auth service indisponible

