      summary: Créer un signalement
      description: "Nécessite authentification. id_utilisateur est injecté automatiquement depuis le JWT — ne pas l'envoyer dans le body."
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - type
                - id_conteneur
              properties:
                type:
                  type: string
                  enum: ["CONTENEUR_PLEIN", "CONTENEUR_ENDOMMAGÉ", "MAUVAISE_ODEUR", "DÉBORDEMENT", "AUTRE"]
                  description: "Valeurs avec accents, encoder en UTF-8"
                description:
                  type: string
                id_conteneur:
                  type: string
                  format: uuid
                latitude:
                  type: number
                longitude:
                  type: number
                photo_url:
                  type: string
                  format: uri
                priorite:
                  type: string
                  enum: [BASSE, NORMALE, HAUTE, CRITIQUE]
                  default: NORMALE
      responses:
        '201':
          description: Signalement créé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Signalement'
        '401':
          description: Non authentifié

    get:
      tags:
        - Signal
      summary: Liste tous les signalements
      security:
        - BearerAuth: []
      parameters:
        - name: type
          in: query
          schema:
            type: string
        - name: statut
          in: query
          schema:
            type: string
            enum: [OUVERT, EN_COURS_DE_TRAITEMENT, "FERMÉ", "REJETÉ"]
        - name: priorite
          in: query
          schema:
            type: string
            enum: [BASSE, NORMALE, HAUTE, CRITIQUE]
      responses:
        '200':
          description: Liste des signalements
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Signalement'
                  count:
                    type: integer

