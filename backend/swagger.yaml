openapi: 3.0.0
info:
  title: EcoTrack API
  description: |
    Plateforme Event-Driven Microservices pour gestion optimisée de déchets urbains et collecte intelligente.

    ## Architecture
    - **API Gateway** : Point d'entrée unique sur `http://localhost:3000`
    - **7 Microservices** : auth, container, tour, signal, user, iot + gateway
    - **Message Broker** : RabbitMQ (exchange `ecotrack_events`, topic)
    - **Database** : PostgreSQL par service (Database-per-Service pattern)
    - **Monitoring** : Prometheus (`:9090`) + Grafana (`:3100`) + `/metrics` par service
    - **Connection Pooling** : PgBouncer (`:6432`)
    - **Cache** : Redis (`:6379`) — rate limiting, sessions

    ## Événements RabbitMQ (synchronisation inter-services)

    | Événement | Publié par | Consommé par | Action |
    |-----------|-----------|-------------|--------|
    | `user.created` | auth | user | Crée Utilisateur + profil (Citoyen/Agent/Admin) |
    | `measurement.created` | container | signal, tour | Auto-création signalement si remplissage > 85% |
    | `measurement.alert` | iot | signal, container | Alerte débordement / passage en maintenance |
    | `container.maintenance_needed` | iot | signal | Crée signalement automatique |
    | `signalement.created` | signal | container | Conteneur → maintenance si PLEIN/DÉBORDEMENT |
    | `signalement.closed` | signal | container | Conteneur → actif si tous signalements résolus |
    | `signalement.rejected` | signal | container | Idem |
    | `tournee.started` | tour | signal | Signalements OUVERT liés → EN_COURS_DE_TRAITEMENT |
    | `tournee.completed` | tour | signal | Signalements restants → FERMÉ (auto-clôture) |
    | `container.created` | container | — | Disponible (future) |
    | `container.status_changed` | container | signal | Si retiré → signalements REJETÉ |
    | `container.zone_changed` | container | — | Disponible (future: tour-service) |
    | `container.deleted` | container | signal | Signalements ouverts → REJETÉ |
    | `zone.created` | container | — | Disponible (future: tour-service) |
    | `zone.updated` | container | — | Disponible (future: tour-service) |
    | `zone.deleted` | container | — | Disponible (future: tour-service) |

    ## Rôles RBAC
    | Rôle | Accès |
    |------|-------|
    | `super_admin` | Tout — gestion utilisateurs, zones, config |
    | `admin` | Gestion conteneurs, signalements, tournées, utilisateurs |
    | `agent` | Tournées assignées, signalements, clôture avec photo |
    | `citoyen` | Création signalements, suivi de ses propres signalements |
  version: 2.0.0
  contact:
    name: EcoTrack Team
  license:
    name: MIT

servers:
  - url: http://localhost:3000/api
    description: Development Server (Gateway)
  - url: http://localhost:3001
    description: Auth Service
  - url: http://localhost:3002
    description: Container Service
  - url: http://localhost:3003
    description: Tour Service
  - url: http://localhost:3004
    description: Signal Service
  - url: http://localhost:3005
    description: User Service
  - url: http://localhost:3006
    description: IoT Service

# ============================================
# SECURITY SCHEMES
# ============================================
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token obtenu via POST /auth/login

  schemas:
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        nom:
          type: string
          nullable: true
        prenom:
          type: string
          nullable: true
        telephone:
          type: string
          nullable: true
        role:
          type: string
          enum: [super_admin, admin, agent, citoyen]
        is_active:
          type: boolean
          default: true
        score_reputation:
          type: integer
          default: 0
          nullable: true
          description: Score citoyen uniquement
        created_at:
          type: string
          format: date-time

    Conteneur:
      type: object
      properties:
        id:
          type: string
          format: uuid
        code_conteneur:
          type: string
          example: CONT-00001
        type_conteneur:
          type: string
          enum: [standard, selective, organic, hazardous]
        capacite:
          type: number
          description: Capacité en litres
        latitude:
          type: number
        longitude:
          type: number
        id_zone:
          type: string
          format: uuid
        statut:
          type: string
          enum: [actif, maintenance, retire]
        taux_remplissage:
          type: number
          minimum: 0
          maximum: 100
          nullable: true
          description: Dernier taux de remplissage connu (via capteur IoT)
        date_installation:
          type: string
          format: date-time
        notes:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time

    Mesure:
      type: object
      properties:
        id:
          type: string
          format: uuid
        id_conteneur:
          type: string
          format: uuid
        id_capteur:
          type: string
          format: uuid
          nullable: true
          description: Capteur IoT ayant généré cette mesure
        taux_remplissage:
          type: number
          minimum: 0
          maximum: 100
        temperature:
          type: number
          nullable: true
          description: Température en degrés Celsius
        batterie:
          type: integer
          nullable: true
          description: Niveau de batterie du capteur (%)
        signal_force:
          type: integer
          nullable: true
          description: Force du signal IoT (dBm)
        date_mesure:
          type: string
          format: date-time

    Signalement:
      type: object
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
          enum: [CONTENEUR_PLEIN, CONTENEUR_ENDOMMAGÉ, MAUVAISE_ODEUR, DÉBORDEMENT, AUTRE]
        description:
          type: string
          nullable: true
        statut:
          type: string
          enum: [OUVERT, EN_COURS_DE_TRAITEMENT, FERMÉ, REJETÉ]
          default: OUVERT
        priorite:
          type: string
          enum: [BASSE, NORMALE, HAUTE, CRITIQUE]
          default: NORMALE
        id_conteneur:
          type: string
          format: uuid
        id_utilisateur:
          type: string
          format: uuid
          nullable: true
          description: "null pour les signalements auto-générés par IoT"
        latitude:
          type: number
          nullable: true
        longitude:
          type: number
          nullable: true
        photo_url:
          type: string
          format: uri
          nullable: true
          description: Photo de preuve lors de la clôture (/uploads/signals/{uuid}.jpg)
        photo_resolution_url:
          type: string
          format: uri
          nullable: true
        motif_rejet:
          type: string
          nullable: true
          description: Motif de rejet (rempli par l'admin)
        date_resolution:
          type: string
          format: date-time
          nullable: true
        notes_resolution:
          type: string
          nullable: true
        id_tournee:
          type: string
          format: uuid
          nullable: true
          description: Tournée à laquelle ce signalement est assigné
        id_zone:
          type: string
          format: uuid
          nullable: true
          description: Zone du conteneur (auto-détectée depuis container-service à la création)

    Tournee:
      type: object
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
          example: TRN-2026-001
        titre:
          type: string
          nullable: true
          description: Titre lisible (optionnel, fallback sur code)
        date:
          type: string
          format: date-time
        statut:
          type: string
          enum: ["PLANIFIÉE", "EN_COURS", "TERMINÉE", "ANNULÉE"]
          default: "PLANIFIÉE"
        heure_debut:
          type: string
          description: Heure de début réelle (format HH:MM:SS)
          nullable: true
        heure_fin:
          type: string
          description: Heure de fin réelle (format HH:MM:SS)
          nullable: true
        distance_km:
          type: number
          nullable: true
        conteneurs_collectes:
          type: integer
          default: 0
        notes:
          type: string
          nullable: true
        id_zone:
          type: string
          format: uuid
          nullable: true
          description: Zone concernée par la tournée
        agents:
          type: array
          items:
            $ref: '#/components/schemas/TourneeAgent'
        created_at:
          type: string
          format: date-time

    TourneeAgent:
      type: object
      properties:
        id:
          type: string
          format: uuid
        id_tournee:
          type: string
          format: uuid
        id_agent:
          type: string
          format: uuid
        role:
          type: string
          enum: [CONDUCTEUR, COLLECTEUR]
          default: COLLECTEUR
        heure_debut_reel:
          type: string
          description: Heure de début réelle de l'agent (HH:MM:SS)
          nullable: true
        heure_fin_reelle:
          type: string
          description: Heure de fin réelle de l'agent (HH:MM:SS)
          nullable: true

    Vehicule:
      type: object
      properties:
        id:
          type: string
          format: uuid
        immatriculation:
          type: string
        marque:
          type: string
        modele:
          type: string
          nullable: true
        type_vehicule:
          type: string
          enum: [BENNE, COMPACTEUR, UTILITAIRE, CAMION_GRUE]
          default: BENNE
        capacite_tonnes:
          type: number
          nullable: true
        kilometrage:
          type: integer
          default: 0
        statut:
          type: string
          enum: [ACTIF, INACTIF, EN_MAINTENANCE]
          default: ACTIF
        id_agent:
          type: string
          format: uuid
          nullable: true
        date_derniere_maintenance:
          type: string
          format: date-time
          nullable: true
        date_prochain_controle:
          type: string
          format: date-time
          nullable: true

    Capteur:
      type: object
      properties:
        id:
          type: string
          format: uuid
        code_capteur:
          type: string
          example: CAPT-CONT-00001-REMP
        type:
          type: string
          enum: [REMPLISSAGE, TEMPERATURE, SIGNAL]
        statut:
          type: string
          enum: [ACTIF, INACTIF, EN_MAINTENANCE]
          default: ACTIF
        batterie:
          type: integer
          nullable: true
          description: Niveau de batterie (0-100%)
        id_conteneur:
          type: string
          format: uuid
        valeur_actuelle:
          type: number
          nullable: true
          description: Dernière valeur mesurée
        derniere_mesure:
          type: object
          nullable: true
          properties:
            taux_remplissage:
              type: number
            temperature:
              type: number
            date_mesure:
              type: string
              format: date-time
        created_at:
          type: string
          format: date-time

    Error:
      type: object
      properties:
        message:
          type: string
        statusCode:
          type: integer
        timestamp:
          type: string
          format: date-time

# ============================================
# PATHS
# ============================================
paths:
  # ========== AUTH ENDPOINTS ==========
  /auth/register:
    post:
      tags:
        - Authentication
      summary: Register new user
      description: Create new user account (public endpoint)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
              required:
                - email
                - password
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
                  accessToken:
                    type: string
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/login:
    post:
      tags:
        - Authentication
      summary: Login user
      description: Authenticate user and get JWT token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
              required:
                - email
                - password
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
                  accessToken:
                    type: string
                  refreshToken:
                    type: string
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/logout:
    post:
      tags:
        - Authentication
      summary: Logout user
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Logout successful
        '401':
          description: Unauthorized

  /auth/verify:
    post:
      tags:
        - Authentication
      summary: Verify JWT token
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Token is valid
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
        '401':
          description: Invalid token

  /auth/refresh-token:
    post:
      tags:
        - Authentication
      summary: Refresh JWT token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                refreshToken:
                  type: string
      responses:
        '200':
          description: New token generated
          content:
            application/json:
              schema:
                type: object
                properties:
                  accessToken:
                    type: string

  /auth/me:
    get:
      tags:
        - Authentication
      summary: Profil de l'utilisateur connecté
      description: Retourne les informations décodées du JWT (id, email, role, nom, prenom).
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Informations de l'utilisateur connecté
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
        '401':
          description: Token manquant ou invalide

  # ========== CONTAINER ENDPOINTS ==========
  /conteneurs:
    post:
      tags:
        - Container
      summary: Créer un conteneur
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - code_conteneur
                - type_conteneur
                - capacite
                - latitude
                - longitude
                - date_installation
                - id_zone
              properties:
                code_conteneur:
                  type: string
                  example: CONT-2024-001
                type_conteneur:
                  type: string
                  enum: [standard, selective, organic, hazardous]
                capacite:
                  type: number
                  description: Capacité en litres
                latitude:
                  type: number
                longitude:
                  type: number
                date_installation:
                  type: string
                  format: date-time
                id_zone:
                  type: string
                  format: uuid
                notes:
                  type: string
      responses:
        '201':
          description: Conteneur créé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Conteneur'
        '400':
          description: Données invalides
        '401':
          description: Non authentifié

    get:
      tags:
        - Container
      summary: Liste tous les conteneurs
      security:
        - BearerAuth: []
      parameters:
        - name: statut
          in: query
          schema:
            type: string
            enum: [actif, maintenance, retire]
        - name: id_zone
          in: query
          schema:
            type: string
            format: uuid
        - name: type_conteneur
          in: query
          schema:
            type: string
            enum: [standard, selective, organic, hazardous]
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Liste des conteneurs
          content:
            application/json:
              schema:
                type: object
                properties:
                  conteneurs:
                    type: array
                    items:
                      $ref: '#/components/schemas/Conteneur'
                  total:
                    type: integer

  /conteneurs/nearby:
    get:
      tags:
        - Container
      summary: Conteneurs proches d'un point GPS
      description: Retourne les conteneurs actifs dans un rayon donné (Haversine). Max 50 résultats.
      security:
        - BearerAuth: []
      parameters:
        - name: lat
          in: query
          required: true
          description: Latitude du point de référence
          schema:
            type: number
            example: 48.8566
        - name: lng
          in: query
          required: true
          description: Longitude du point de référence
          schema:
            type: number
            example: 2.3522
        - name: radius
          in: query
          description: Rayon de recherche en kilomètres (défaut 5)
          schema:
            type: number
            default: 5
            example: 2
      responses:
        '200':
          description: Conteneurs trouvés dans le rayon
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  conteneurs:
                    type: array
                    items:
                      allOf:
                        - $ref: '#/components/schemas/Conteneur'
                        - type: object
                          properties:
                            distance_km:
                              type: number
                              description: Distance en km depuis le point de référence
        '400':
          description: lat et lng obligatoires ou coordonnées invalides
        '401':
          description: Non authentifié

  /conteneurs/needs-service:
    get:
      tags:
        - Container
      summary: Conteneurs nécessitant une intervention
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Conteneurs à traiter
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Conteneur'

  /conteneurs/{conteneurId}:
    get:
      tags:
        - Container
      summary: Détails d'un conteneur
      security:
        - BearerAuth: []
      parameters:
        - name: conteneurId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Détails du conteneur
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Conteneur'
        '404':
          description: Conteneur introuvable

    put:
      tags:
        - Container
      summary: Mettre à jour un conteneur
      security:
        - BearerAuth: []
      parameters:
        - name: conteneurId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                statut:
                  type: string
                  enum: [actif, maintenance, retire]
                capacite:
                  type: number
                notes:
                  type: string
      responses:
        '200':
          description: Conteneur mis à jour
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Conteneur'

    delete:
      tags:
        - Container
      summary: Supprimer un conteneur
      security:
        - BearerAuth: []
      parameters:
        - name: conteneurId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Conteneur supprimé

  # ========== MEASUREMENT ENDPOINTS ==========
  /mesures:
    post:
      tags:
        - Measurement
      summary: Enregistrer une mesure de remplissage
      description: Créer une nouvelle mesure pour un conteneur. Utilisé par le service IoT.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - taux_remplissage
                - id_conteneur
              properties:
                id_conteneur:
                  type: string
                  format: uuid
                taux_remplissage:
                  type: number
                  minimum: 0
                  maximum: 100
                temperature:
                  type: number
                batterie:
                  type: integer
                  minimum: 0
                  maximum: 100
                signal_force:
                  type: integer
      responses:
        '201':
          description: Mesure enregistrée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Mesure'

  /mesures/conteneur/{conteneurId}:
    get:
      tags:
        - Measurement
      summary: Historique des mesures d'un conteneur
      security:
        - BearerAuth: []
      parameters:
        - name: conteneurId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Liste des mesures
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Mesure'

  /mesures/conteneur/{conteneurId}/latest:
    get:
      tags:
        - Measurement
      summary: Dernière mesure d'un conteneur
      security:
        - BearerAuth: []
      parameters:
        - name: conteneurId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Dernière mesure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Mesure'

  /mesures/conteneur/{conteneurId}/stats:
    get:
      tags:
        - Measurement
      summary: Statistiques des mesures d'un conteneur
      security:
        - BearerAuth: []
      parameters:
        - name: conteneurId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Statistiques de remplissage
          content:
            application/json:
              schema:
                type: object
                properties:
                  average_fill_rate:
                    type: number
                  max_fill_rate:
                    type: number

  # ========== ZONE ENDPOINTS ==========
  /zones:
    post:
      tags:
        - Zone
      summary: Créer une zone
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - nom
                - code_zone
              properties:
                nom:
                  type: string
                code_zone:
                  type: string
                geometrie:
                  type: string
                  description: GeoJSON (optionnel)
                population_estimee:
                  type: integer
      responses:
        '201':
          description: Zone créée

    get:
      tags:
        - Zone
      summary: Liste toutes les zones
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Liste des zones

  /zones/{zoneId}:
    get:
      tags:
        - Zone
      summary: Détails d'une zone
      security:
        - BearerAuth: []
      parameters:
        - name: zoneId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Détails de la zone
        '404':
          description: Zone introuvable

    put:
      tags:
        - Zone
      summary: Mettre à jour une zone
      security:
        - BearerAuth: []
      parameters:
        - name: zoneId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Zone mise à jour

    delete:
      tags:
        - Zone
      summary: Supprimer une zone
      security:
        - BearerAuth: []
      parameters:
        - name: zoneId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Zone supprimée

  # ========== CONTAINER STATS ==========
  /container-stats/dashboard:
    get:
      tags:
        - Container Stats
      summary: Statistiques globales des conteneurs
      security:
        - BearerAuth: []
