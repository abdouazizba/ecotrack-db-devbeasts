              properties:
                type:
                  type: string
                  enum: ["CONTENEUR_PLEIN", "CONTENEUR_ENDOMMAGÉ", "MAUVAISE_ODEUR", "DÉBORDEMENT", "AUTRE"]
                  description: "Valeurs avec accents, encoder en UTF-8"
                description:
                  type: string
                id_conteneur:
                  type: string
                  format: uuid
                latitude:
                  type: number
                longitude:
                  type: number
                photo_url:
                  type: string
                  format: uri
                priorite:
                  type: string
                  enum: [BASSE, NORMALE, HAUTE, CRITIQUE]
                  default: NORMALE
      responses:
