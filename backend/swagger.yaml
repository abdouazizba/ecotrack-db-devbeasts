      tags:
        - Dashboard
      summary: Statistiques agrégées pour le tableau de bord
      description: Agrège les statistiques de container-service, tour-service et signal-service en un seul appel.
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Statistiques agrégées
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      containers:
                        type: integer
                      zones:
                        type: integer
                      tours:
                        type: integer
                      toursInProgress:
                        type: integer
                      averageFillRate:
                        type: number
                      criticalContainers:
                        type: integer
                      openSignals:
                        type: integer
                      totalSignals:
                        type: integer
