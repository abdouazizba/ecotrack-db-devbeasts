                  type: string
                type:
                  type: string
                  enum: [REMPLISSAGE, TEMPERATURE, SIGNAL]
                statut:
                  type: string
                  enum: [ACTIF, INACTIF, EN_MAINTENANCE]
                batterie:
                  type: integer
                  minimum: 0
                  maximum: 100
      responses:
        '200':
          description: Capteur mis à jour
        '404':
          description: Capteur introuvable

    delete:
      tags:
        - Capteur
      summary: Supprimer un capteur
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
