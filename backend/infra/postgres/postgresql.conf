# PostgreSQL tuning for 500K users (Docker local)
# Override defaults for higher concurrency

# CRITICAL: must listen on all interfaces for Docker networking
listen_addresses = '*'

# Connections
max_connections = 100

# Memory — tuned for 512MB-1GB RAM per DB container
shared_buffers = 256MB
effective_cache_size = 512MB
work_mem = 4MB
maintenance_work_mem = 64MB

# WAL — faster writes
wal_buffers = 16MB
checkpoint_completion_target = 0.9
max_wal_size = 1GB

# Query planner
random_page_cost = 1.1
effective_io_concurrency = 200
default_statistics_target = 100

# Logging — minimal in prod
log_min_duration_statement = 1000
log_checkpoints = on
log_lock_waits = on

# Autovacuum — more aggressive for high write volume
autovacuum_max_workers = 3
autovacuum_naptime = 30s
autovacuum_vacuum_threshold = 50
autovacuum_analyze_threshold = 50
