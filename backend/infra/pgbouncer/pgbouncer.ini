[databases]
ecotrack_auth      = host=auth-db      port=5432 dbname=ecotrack_auth
ecotrack_container = host=container-db  port=5432 dbname=ecotrack_container
ecotrack_tour      = host=tour-db      port=5432 dbname=ecotrack_tour
ecotrack_signal    = host=signal-db    port=5432 dbname=ecotrack_signal
ecotrack_user      = host=user-db      port=5432 dbname=ecotrack_user

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt

; Pool mode: transaction = release connection after each transaction (best for microservices)
pool_mode = transaction

; Pool sizing for 500K users
default_pool_size = 40
min_pool_size = 10
max_client_conn = 2000
max_db_connections = 50

; Timeouts
server_idle_timeout = 300
client_idle_timeout = 600
query_timeout = 30

; Logging
log_connections = 0
log_disconnections = 0
log_pooler_errors = 1

admin_users = postgres
stats_users = postgres
