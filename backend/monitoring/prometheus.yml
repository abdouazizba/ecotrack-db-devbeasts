global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # ── API Gateway ──
  - job_name: 'gateway'
    static_configs:
      - targets: ['gateway:3000']
    metrics_path: /metrics

  # ── Microservices ──
  - job_name: 'auth-service'
    static_configs:
      - targets: ['auth-service:3001']
    metrics_path: /metrics

  - job_name: 'container-service'
    static_configs:
      - targets: ['container-service:3002']
    metrics_path: /metrics

  - job_name: 'tour-service'
    static_configs:
      - targets: ['tour-service:3003']
    metrics_path: /metrics

  - job_name: 'signal-service'
    static_configs:
      - targets: ['signal-service:3004']
    metrics_path: /metrics

  - job_name: 'user-service'
    static_configs:
      - targets: ['user-service:3005']
    metrics_path: /metrics

  # ── PostgreSQL (via exporter) ──
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']

  # ── RabbitMQ (built-in prometheus plugin) ──
  - job_name: 'rabbitmq'
    static_configs:
      - targets: ['rabbitmq:15692']
    metrics_path: /metrics
