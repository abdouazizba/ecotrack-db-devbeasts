# ════════════════════════════════════════════════════════════════
# PRODUCTION OVERLAY — 500K users infrastructure
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
# ════════════════════════════════════════════════════════════════

services:

  # ── Nginx Load Balancer ─────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: ecotrack_nginx
    ports:
      - "8080:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - gateway
    networks:
      - ecotrack-network
    restart: unless-stopped

  # ── PgBouncer — Connection Pooler ───────────────────────────
  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: ecotrack_pgbouncer
    volumes:
      - ./infra/pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ./infra/pgbouncer/userlist.txt:/etc/pgbouncer/userlist.txt:ro
    ports:
      - "6432:6432"
    depends_on:
      auth-db:
        condition: service_healthy
      container-db:
        condition: service_healthy
      tour-db:
        condition: service_healthy
      signal-db:
        condition: service_healthy
      user-db:
        condition: service_healthy
    networks:
      - ecotrack-network
    restart: unless-stopped

  # ── Redis — Rate Limiting & Cache ───────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ecotrack_redis
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ecotrack-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── PostgreSQL overrides — tuned config ─────────────────────
  auth-db:
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    volumes:
      - auth_db_data:/var/lib/postgresql/data
      - ./infra/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    shm_size: '256mb'

  container-db:
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    volumes:
      - container_db_data:/var/lib/postgresql/data
      - ./infra/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    shm_size: '256mb'

  tour-db:
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    volumes:
      - tour_db_data:/var/lib/postgresql/data
      - ./infra/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    shm_size: '256mb'

  signal-db:
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    volumes:
      - signal_db_data:/var/lib/postgresql/data
      - ./infra/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    shm_size: '256mb'

  user-db:
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    volumes:
      - user_db_data:/var/lib/postgresql/data
      - ./infra/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    shm_size: '256mb'

  # ── Services overrides — point to PgBouncer + Redis ─────────
  auth-service:
    environment:
      NODE_ENV: production
      DB_HOST: pgbouncer
      DB_PORT: 6432
      DB_NAME: ecotrack_auth
      REDIS_URL: redis://redis:6379
      NODE_OPTIONS: "--max-old-space-size=512"
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 512M

  container-service:
    environment:
      NODE_ENV: production
      DB_HOST: pgbouncer
      DB_PORT: 6432
      DB_NAME: ecotrack_container
      REDIS_URL: redis://redis:6379
      NODE_OPTIONS: "--max-old-space-size=1024"
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 1G

  tour-service:
    environment:
      NODE_ENV: production
      DB_HOST: pgbouncer
      DB_PORT: 6432
      DB_NAME: ecotrack_tour
      REDIS_URL: redis://redis:6379
      NODE_OPTIONS: "--max-old-space-size=512"
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 512M

  signal-service:
    environment:
      NODE_ENV: production
      DB_HOST: pgbouncer
      DB_PORT: 6432
      DB_NAME: ecotrack_signal
      REDIS_URL: redis://redis:6379
      NODE_OPTIONS: "--max-old-space-size=512"
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 512M

  user-service:
    environment:
      NODE_ENV: production
      DB_HOST: pgbouncer
      DB_PORT: 6432
      DB_NAME: ecotrack_user
      REDIS_URL: redis://redis:6379
      NODE_OPTIONS: "--max-old-space-size=512"
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 512M

  gateway:
    environment:
      NODE_ENV: production
      REDIS_URL: redis://redis:6379
      NODE_OPTIONS: "--max-old-space-size=512"
    deploy:
      replicas: 3
      resources:
        limits:
          memory: 512M

volumes:
  redis_data:
