services:

  # ══════════════════════════════════════════════════════════════
  # INFRASTRUCTURE
  # ══════════════════════════════════════════════════════════════

  # RabbitMQ — Message Broker
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: ecotrack_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ecotrack
      RABBITMQ_DEFAULT_PASS: ecotrack123
      RABBITMQ_PLUGINS: "rabbitmq_management rabbitmq_prometheus"
    ports:
      - "5672:5672"
      - "15672:15672"
      - "15692:15692"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - ecotrack-network
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 30s
      timeout: 10s
      retries: 5

  # Redis — Cache + Rate Limiting distribué
  redis:
    image: redis:7-alpine
    container_name: ecotrack_redis
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ecotrack-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ══════════════════════════════════════════════════════════════
  # DATABASES (PostgreSQL tunée pour 500K users)
  # ══════════════════════════════════════════════════════════════

  auth-db:
    image: postgres:16-alpine
    container_name: ecotrack_auth_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ecotrack_auth
    ports:
      - "5432:5432"
    volumes:
      - auth_db_data:/var/lib/postgresql/data
      - ./infra/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    shm_size: '256mb'
    networks:
      - ecotrack-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  container-db:
    image: postgres:16-alpine
    container_name: ecotrack_container_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ecotrack_container
    ports:
      - "5433:5432"
    volumes:
      - container_db_data:/var/lib/postgresql/data
      - ./infra/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    shm_size: '256mb'
    networks:
      - ecotrack-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  tour-db:
    image: postgres:16-alpine
    container_name: ecotrack_tour_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ecotrack_tour
    ports:
      - "5434:5432"
    volumes:
      - tour_db_data:/var/lib/postgresql/data
      - ./infra/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    shm_size: '256mb'
    networks:
      - ecotrack-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  signal-db:
    image: postgres:16-alpine
    container_name: ecotrack_signal_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ecotrack_signal
    ports:
      - "5435:5432"
    volumes:
      - signal_db_data:/var/lib/postgresql/data
      - ./infra/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    shm_size: '256mb'
    networks:
      - ecotrack-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  user-db:
    image: postgres:16-alpine
    container_name: ecotrack_user_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ecotrack_user
    ports:
      - "5436:5432"
    volumes:
      - user_db_data:/var/lib/postgresql/data
      - ./infra/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    shm_size: '256mb'
    networks:
      - ecotrack-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # PgBouncer — Connection Pooler (2000 clients → 40 connections/db)
  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: ecotrack_pgbouncer
    volumes:
      - ./infra/pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ./infra/pgbouncer/userlist.txt:/etc/pgbouncer/userlist.txt:ro
    ports:
      - "6432:6432"
    depends_on:
      auth-db:
        condition: service_healthy
      container-db:
        condition: service_healthy
      tour-db:
        condition: service_healthy
      signal-db:
        condition: service_healthy
      user-db:
        condition: service_healthy
    networks:
      - ecotrack-network
    restart: unless-stopped

  # ══════════════════════════════════════════════════════════════
  # MICROSERVICES (pointent vers PgBouncer + Redis)
  # ══════════════════════════════════════════════════════════════

  auth-service:
    build: ./services/auth
    container_name: ecotrack_auth_service
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      SERVER_PORT: 3001
      DB_HOST: auth-db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: ecotrack_auth
      CORS_ORIGIN: "*"
      RABBITMQ_URL: amqp://ecotrack:ecotrack123@rabbitmq:5672
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ecotrack_jwt_secret_change_in_production
      REFRESH_TOKEN_SECRET: ecotrack_refresh_secret_change_in_production
    depends_on:
      auth-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ecotrack-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3001/health', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  container-service:
    build: ./services/container-service
    container_name: ecotrack_container_service
    ports:
      - "3002:3002"
    environment:
      NODE_ENV: development
      SERVER_PORT: 3002
      DB_HOST: container-db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: ecotrack_container
      CORS_ORIGIN: "*"
      AUTH_SERVICE_URL: http://auth-service:3001
      RABBITMQ_URL: amqp://ecotrack:ecotrack123@rabbitmq:5672
      REDIS_URL: redis://redis:6379
      NODE_OPTIONS: "--max-old-space-size=1024"
    depends_on:
      container-db:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - ecotrack-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3002/health', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s

  tour-service:
    build: ./services/tour-service
    container_name: ecotrack_tour_service
    ports:
      - "3003:3003"
    environment:
      NODE_ENV: development
      SERVER_PORT: 3003
      DB_HOST: tour-db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: ecotrack_tour
      CORS_ORIGIN: "*"
      AUTH_SERVICE_URL: http://auth-service:3001
      CONTAINER_SERVICE_URL: http://container-service:3002
      RABBITMQ_URL: amqp://ecotrack:ecotrack123@rabbitmq:5672
      REDIS_URL: redis://redis:6379
    depends_on:
      tour-db:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      container-service:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - ecotrack-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3003/health', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

  signal-service:
    build: ./services/signal-service
    container_name: ecotrack_signal_service
    ports:
      - "3004:3004"
    environment:
      NODE_ENV: development
      SERVER_PORT: 3004
      DB_HOST: signal-db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: ecotrack_signal
      CORS_ORIGIN: "*"
      AUTH_SERVICE_URL: http://auth-service:3001
      CONTAINER_SERVICE_URL: http://container-service:3002
      RABBITMQ_URL: amqp://ecotrack:ecotrack123@rabbitmq:5672
      REDIS_URL: redis://redis:6379
    depends_on:
      signal-db:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      container-service:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - ecotrack-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3004/health', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

  iot-service:
    build: ./services/iot-service
    container_name: ecotrack_iot_service
    ports:
      - "3006:3006"
    environment:
      NODE_ENV: development
      PORT: 3006
      CONTAINER_SERVICE_URL: http://container-service:3002
      DEVICE_API_KEY: ecotrack_iot_device_key_change_in_prod
      API_KEY_REQUIRED: "false"
      LOG_LEVEL: info
    depends_on:
      container-service:
        condition: service_healthy
    networks:
      - ecotrack-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3006/health', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

  user-service:
    build: ./services/user-service
    container_name: ecotrack_user_service
    ports:
      - "3005:3005"
    environment:
      NODE_ENV: development
      SERVER_PORT: 3005
      DB_HOST: user-db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: ecotrack_user
      CORS_ORIGIN: "*"
      AUTH_SERVICE_URL: http://auth-service:3001
      CONTAINER_SERVICE_URL: http://container-service:3002
      RABBITMQ_URL: amqp://ecotrack:ecotrack123@rabbitmq:5672
      REDIS_URL: redis://redis:6379
    depends_on:
      user-db:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      container-service:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - ecotrack-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3005/health', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

  # ══════════════════════════════════════════════════════════════
  # API GATEWAY
  # ══════════════════════════════════════════════════════════════

  gateway:
    build: ./ecotrack-gateway
    container_name: ecotrack_gateway
    ports:
      - "3000:3000"
    volumes:
      - ./swagger.yaml:/app/swagger.yaml:ro
    environment:
      NODE_ENV: development
      GATEWAY_PORT: 3000
      AUTH_SERVICE_URL: http://auth-service:3001
      USER_SERVICE_URL: http://user-service:3005
      CONTAINER_SERVICE_URL: http://container-service:3002
      TOUR_SERVICE_URL: http://tour-service:3003
      SIGNAL_SERVICE_URL: http://signal-service:3004
      IOT_SERVICE_URL: http://iot-service:3006
      REDIS_URL: redis://redis:6379
      CORS_ORIGIN: "*"
    depends_on:
      auth-service:
        condition: service_healthy
      user-service:
        condition: service_healthy
      container-service:
        condition: service_healthy
      tour-service:
        condition: service_healthy
      signal-service:
        condition: service_healthy
      iot-service:
        condition: service_healthy
    networks:
      - ecotrack-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/health', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

  # ══════════════════════════════════════════════════════════════
  # ADMIN & MONITORING
  # ══════════════════════════════════════════════════════════════

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ecotrack_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@ecotrack.com
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_ENHANCED_COOKIE_PROTECTION: 'False'
      PGADMIN_CONFIG_COOKIE_DEFAULT_SECURE: 'False'
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - ecotrack-network
    depends_on:
      - auth-db
      - container-db
      - tour-db
      - signal-db

  prometheus:
    image: prom/prometheus:latest
    container_name: ecotrack_prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - ecotrack-network
    depends_on:
      - gateway
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: ecotrack_grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ecotrack123
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    ports:
      - "3100:3000"
    depends_on:
      - prometheus
    networks:
      - ecotrack-network
    restart: unless-stopped

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: ecotrack_pg_exporter
    environment:
      DATA_SOURCE_URI: "container-db:5432/ecotrack_container?sslmode=disable"
      DATA_SOURCE_USER: postgres
      DATA_SOURCE_PASS: postgres
    ports:
      - "9187:9187"
    depends_on:
      container-db:
        condition: service_healthy
    networks:
      - ecotrack-network
    restart: unless-stopped

  # ══════════════════════════════════════════════════════════════
  # FRONTEND
  # ══════════════════════════════════════════════════════════════

  frontend:
    build:
      context: ../../ecotrack-frontend
      dockerfile: Dockerfile
    container_name: ecotrack-frontend
    ports:
      - "80:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:3000/api
    depends_on:
      - gateway
    networks:
      - ecotrack-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 30s

volumes:
  auth_db_data:
  container_db_data:
  tour_db_data:
  signal_db_data:
  user_db_data:
  pgadmin_data:
  rabbitmq_data:
  prometheus_data:
  grafana_data:
  redis_data:

networks:
  ecotrack-network:
    driver: bridge
