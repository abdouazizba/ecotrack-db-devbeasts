name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ─── Auth Service ────────────────────────────────────────────────────────────
  test-auth:
    name: Tests — auth-service
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ecotrack_auth
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/services/auth/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: backend/services/auth
      - name: Run tests
        run: npm test
        working-directory: backend/services/auth
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_NAME: ecotrack_auth
          JWT_SECRET: ci_test_secret_ecotrack
          JWT_REFRESH_SECRET: ci_test_refresh_secret_ecotrack

