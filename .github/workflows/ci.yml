          DB_PORT: 5432
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_NAME: ecotrack_container
          AUTH_SERVICE_URL: http://localhost:3001
          JWT_SECRET: ci_test_secret_ecotrack

